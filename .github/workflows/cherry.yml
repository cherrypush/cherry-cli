name: Upload metrics to cherrypush.com

on:
  push:
    branches:
      - ${{ github.event.repository.default_branch }}

jobs:
  cherry:
    name: Cherry push
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install cherry
        run: npm i -g cherrypush
      - name: Push metrics
        run: cherry push --api-key=${{ secrets.CHERRY_API_KEY }}
